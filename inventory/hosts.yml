---
# Inventory für zentrale Updates / Reboots
#
# Ziel-Gruppen für separate Ausführung:
#   proxmox   -> Proxmox-Hypervisor-Hosts (PVE selbst)
#   vms_prod  -> Produktiv-VMs
#   vms_test  -> Test-VMs
#   control   -> Steuer-VM(s) für Ansible/Semaphore selbst.
#                Komplett losgelöst — NICHT in vms_prod enthalten, damit
#                ein vms_prod-Lauf die Steuer-VM nicht mit anfasst.
#                Wartung manuell anstoßen, idealerweise von einem anderen Host.
#
# Aufruf-Beispiele (Playbooks lesen die Variable 'target'):
#   ansible-playbook playbooks/update.yml           -e target=proxmox
#   ansible-playbook playbooks/update.yml           -e target=vms_prod
#   ansible-playbook playbooks/update.yml           -e target=vms_test
#   ansible-playbook playbooks/update.yml           -e target=control
#   ansible-playbook playbooks/reboot-if-needed.yml -e target=control
#
# Zusätzlich gibt es OS-Familien-Gruppen (debian_family / redhat_family).
# Das Update-Playbook erkennt darüber automatisch den richtigen Paketmanager.
# Ein Host kann gleichzeitig z.B. in 'vms_prod' und 'debian_family' stehen.

all:
  children:

    # === Ziel-Gruppen ======================================================

    # --- Proxmox-Hypervisor (PVE selbst, Debian-basiert) ------------------
    proxmox:
      hosts:
        prox01:
          ansible_host: 192.168.1.6
        prox02:
          ansible_host: 192.168.1.7
        prox03:
          ansible_host: 192.168.1.8
        prox04:
          ansible_host: 192.168.1.9
        prox05:
          ansible_host: 192.168.1.10

    # --- Produktiv-VMs ----------------------------------------------------
    vms_prod:
      hosts:
        twingate01:
          ansible_host: 192.168.1.20
        twingate02:
          ansible_host: 192.168.1.21
        bind9:
          ansible_host: 192.168.1.30
        pihole01:
          ansible_host: 192.168.1.31
        unbound01:
          ansible_host: 192.168.1.32
        traefik01:
          ansible_host: 192.168.1.33

    # --- Test-VMs ---------------------------------------------------------
    vms_test:
      hosts:
        fashion01:
          ansible_host: 192.168.1.57
        openclaw01:
          ansible_host: 192.168.1.92
        test01:
          ansible_host: 192.168.1.129
          # ansible_user: root          # optional, sonst aus group_vars/all.yml
        kuma01:
          ansible_host: 192.168.1.197

    # --- Steuer-VM (Ansible/Semaphore) ------------------------------------
    # Komplett losgelöst von vms_prod / vms_test / proxmox.
    # Wird NUR bei -e target=control angefasst.
    control:
      hosts:
        semaphore01:
          ansible_host: 192.168.1.55
          # WICHTIG: Reboot deaktivieren — diese VM betreibt Semaphore selbst.
          # Ein Reboot während eines Update-Laufs würde den Job abbrechen.
          update_reboot_policy: never

    # === OS-Familien (für korrekten Paketmanager) ==========================

    debian_family:
      hosts:
        # Proxmox
        prox01: {}
        prox02: {}
        prox03: {}
        prox04: {}
        prox05: {}
        # Prod-VMs
        twingate01: {}
        twingate02: {}
        bind9: {}
        pihole01: {}
        unbound01: {}
        traefik01: {}
        # Control
        semaphore01: {}
        # Test-VMs
        fashion01: {}
        openclaw01: {}
        test01: {}
        kuma01: {}

    redhat_family:
      hosts: {}
        # rocky-vm-01: {}
        # alma-vm-01: {}
