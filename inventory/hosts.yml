---
# VM-Inventory für zentrale Updates
#
# Gruppen-Konzept:
#   - Hosts werden nach Umgebung (test/prod) gruppiert
#   - Zusätzlich nach OS-Familie (debian_family / redhat_family)
#     -> das Update-Playbook unterscheidet automatisch via ansible_os_family
#
# Beispiel: ein Host kann gleichzeitig in 'prod' und 'debian_family' stehen.

all:
  children:

    # --- Umgebungen --------------------------------------------------------
    test:
      hosts:
        test01:
          ansible_host: 192.168.1.129
          # ansible_user: root          # optional, sonst aus group_vars/all.yml

    prod:
      hosts: {}
        # beispiel-vm-01:
        #   ansible_host: 192.168.1.10
        # beispiel-vm-02:
        #   ansible_host: 192.168.1.11

    # --- Proxmox-Hosts (PVE selbst, Debian-basiert) -----------------------
    proxmox:
      hosts: {}
        # pve01:
        #   ansible_host: 192.168.1.2

    # --- OS-Familien (für korrekten Paketmanager) -------------------------
    debian_family:
      hosts:
        test01: {}
      # weitere Debian/Ubuntu/Proxmox-Hosts hier eintragen

    redhat_family:
      hosts: {}
        # rocky-vm-01: {}
        # alma-vm-01: {}
